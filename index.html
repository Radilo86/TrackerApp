<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tracker Premium</title>
    <!-- Enlace al Manifest (PWA) y CSS -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Icono para iOS (Puedes crear una imagen de 192x192 y llamarla icon.png) -->
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <header><h1>Tracker Premium</h1></header>

    <div class="container">
        <!-- SECCIÓN ENTRENAR -->
        <div id="section-train" class="section active">
            <select id="day-selector" onchange="loadDay()">
                <option value="">-- Cargando Entrenamientos... --</option>
            </select>
            <div id="workout-container"></div>
        </div>

        <!-- SECCIÓN EDITOR -->
        <div id="section-build" class="section">
            <div class="card" style="padding: 12px; background-color: var(--bg-color); border:none;">
                <select id="routine-edit-select" onchange="loadRoutineForEdit()" style="margin: 0; border: none; background: transparent; font-weight: 600;">
                    <option value="NEW">+ Crear Nueva Rutina</option>
                </select>
            </div>
            <div class="card">
                <input type="text" id="new-routine-name" placeholder="Nombre (ej. Torso C, Push, etc.)">
                <input type="text" id="new-routine-rule" placeholder="Regla/Nota (ej. Descanso 2 min)">
                <div id="builder-exercises"></div>
                <button class="btn-secondary" onclick="addBuilderExerciseRow()">+ Añadir Ejercicio a la rutina</button>
                <div style="display:flex; gap:10px; margin-top: 10px;">
                    <button id="btn-delete-routine" class="btn-delete" onclick="deleteCurrentRoutine()" style="display:none;">🗑️ Eliminar</button>
                    <button class="btn-save" onclick="saveCustomRoutine()" style="margin:0;">Guardar Rutina</button>
                </div>
            </div>
        </div>

        <!-- SECCIÓN ESTADÍSTICAS -->
        <div id="section-stats" class="section">
            <div class="stats-nav">
                <button id="sbtn-calendar" class="active" onclick="switchStatView('calendar')">Calendario</button>
                <button id="sbtn-habits" onclick="switchStatView('habits')">Hábitos</button>
                <button id="sbtn-muscles" onclick="switchStatView('muscles')">Volumen</button>
                <button id="sbtn-exercises" onclick="switchStatView('exercises')">Historial</button>
            </div>

            <div id="stat-view-calendar" class="stat-view active card">
                <div class="cal-header">
                    <button class="cal-btn" onclick="changeMonth(-1)">&#10094;</button>
                    <h3 id="cal-month-year" style="margin:0; font-size:1.1rem; color:var(--text-color);">Mes Año</h3>
                    <button class="cal-btn" onclick="changeMonth(1)">&#10095;</button>
                </div>
                <div class="cal-grid">
                    <div class="cal-day-name">L</div><div class="cal-day-name">M</div><div class="cal-day-name">X</div>
                    <div class="cal-day-name">J</div><div class="cal-day-name">V</div><div class="cal-day-name">S</div><div class="cal-day-name">D</div>
                </div>
                <div id="cal-body" class="cal-grid" style="margin-top: 5px;"></div>
            </div>

            <div id="stat-view-habits" class="stat-view card"><h3 style="margin-bottom: 20px;">Últimos 30 días</h3><div id="habits-container"></div></div>
            <div id="stat-view-muscles" class="stat-view card"><h3 style="margin-bottom: 5px;">Series Efectivas</h3><div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">Volumen de fuerza (30 días)</div><div id="muscles-container"></div></div>
            
            <div id="stat-view-exercises" class="stat-view card">
                <select id="stat-exercise-selector" onchange="loadExerciseStats()"><option value="">-- Selecciona un Ejercicio --</option></select>
                <div id="stats-list"></div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 5px;">💾 Copia de Seguridad</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">Exporta tus datos para no perderlos, o analízalos en Excel con CSV.</p>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button class="backup-btn" onclick="exportBackup()">⬇️ Backup (JSON)</button>
                    <button class="backup-btn" onclick="document.getElementById('import-file').click()">⬆️ Restaurar</button>
                    <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importBackup(event)">
                </div>
                <button class="backup-btn" style="width:100%; border-color: var(--secondary-color); color: var(--secondary-color);" onclick="exportCSV()">📊 Exportar a Excel (CSV)</button>
            </div>
        </div>
    </div>

    <!-- NAVEGACIÓN INFERIOR -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('train')" id="btn-train"><span class="nav-icon">🏋️</span> Entrenar</button>
        <button class="nav-item" onclick="switchTab('build')" id="btn-build"><span class="nav-icon">⚙️</span> Editor</button>
        <button class="nav-item" onclick="switchTab('stats')" id="btn-stats"><span class="nav-icon">📊</span> Datos</button>
    </nav>

    <!-- MODAL -->
    <div class="modal-overlay" id="day-modal" onclick="closeModal(event)">
        <div class="modal-content" id="modal-content" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <h3 class="modal-title" id="modal-date-title">Fecha</h3>
            <div id="modal-summaries"></div>
        </div>
    </div>

    <div id="toast">✅ Acción completada</div>

    <!-- Archivo JS Modular -->
    <script src="app.js"></script>
</body>
</html>
